name: PDF discovery checks

on:
  push:
    paths:
      - "src/utils/pdfDiscovery.ts"
      - "src/utils/pdfDiscovery*.test.ts"
      - "tests/pdfDiscovery.test.ts"
      - ".github/workflows/pdf-discovery-ci.yml"
  pull_request:
    paths:
      - "src/utils/pdfDiscovery.ts"
      - "src/utils/pdfDiscovery*.test.ts"
      - "tests/pdfDiscovery.test.ts"

permissions:
  contents: read

jobs:
  pdf-discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run PDF discovery tests
        run: npx vitest run src/utils/pdfDiscovery.test.ts src/utils/pdfDiscovery.scope.test.ts tests/pdfDiscovery.test.ts

      - name: Type-check crawler files
        run: npx tsc --noEmit --pretty false
